<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Snickers Site + Clicker Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Welcome to Snickers' Site</h1>
    <h2 class="subheading">My photos</h2>

    <!-- TWO SLIDESHOWS -->
    <div class="slideshow-container">

        <!-- Slideshow 1 -->
        <div class="slideshow-wrapper">
            <div class="slide-track" id="track1">
                <img src="img1.png">
                <img src="img2.png">
                <img src="img3.png">
                <img src="img4.png">
            </div>
        </div>

        <!-- Slideshow 2 -->
        <div class="slideshow-wrapper">
            <div class="slide-track" id="track2">
                <img src="img5.png">
                <img src="img6.png">
                <img src="img7.png">
                <img src="img8.png">
                <img src="img9.png">
                <img src="img10.png">
                <img src="img11.png">
            </div>
        </div>

    </div>

    <h2 class="subheading">Clicker Game</h2>

    <!-- CLICKER GAME -->
    <div class="game-container">
        <img id="clickable" src="jp3.png" alt="Clicker Phone">
        <p id="score">Clicks: 0</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
